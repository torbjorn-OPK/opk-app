<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Oslo Psykologkontor app-ikon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#404D32"/>
      <stop offset="0.55" stop-color="#5C6B4A"/>
      <stop offset="1" stop-color="#6F7E55"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.30" cy="0.24" r="0.95">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink" x1="0.15" y1="0.05" x2="0.85" y2="1">
      <stop offset="0" stop-color="#FCF9F1"/>
      <stop offset="1" stop-color="#E7DDC9"/>
    </linearGradient>
    <filter id="brush" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.020" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="11" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>
  <g filter="url(#brush)">
    <circle cx="256" cy="260" r="150" fill="none" stroke="url(#ink)" stroke-width="32" stroke-linecap="round"
            pathLength="360" stroke-dasharray="322 38" transform="rotate(150 256 260)"/>
  </g>
  <rect x="1" y="1" width="510" height="510" rx="115" fill="none" stroke="#000000" stroke-opacity="0.07" stroke-width="2"/>
</svg>
